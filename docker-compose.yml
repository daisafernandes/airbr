services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: airbr_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airbr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d airbr']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
